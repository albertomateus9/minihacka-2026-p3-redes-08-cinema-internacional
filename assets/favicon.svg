<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="fav-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d94f70" />
      <stop offset="50%" stop-color="#4c7bd9" />
      <stop offset="100%" stop-color="#ffcf5a" />
    </linearGradient>
  </defs>
  <!-- Background circle with gradient -->
  <circle cx="16" cy="16" r="16" fill="url(#fav-grad)" />
  <!-- A cute smiley face: boredom to happiness transformation -->
  <!-- Eyes -->
  <circle cx="11" cy="13" r="2" fill="#ffffff" />
  <circle cx="21" cy="13" r="2" fill="#ffffff" />
  <!-- Smile (upward curve showing happiness) -->
  <path d="M 10,18 Q 16,24 22,18" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
</svg>
